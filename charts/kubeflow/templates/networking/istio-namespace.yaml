{- /*
  istioNamespace component
  Source: common/istio/istio-namespace/base
  Enabled by default: True
*/ -}

{- if .Values.istioNamespace.enabled }

apiVersion: v1
kind: Namespace
metadata:
  labels:
    istio-injection: disabled
    istio-operator-managed: Reconcile
    pod-security.kubernetes.io/enforce: restricted
  name: istio-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istiod-control-plane
  namespace: istio-system
spec:
  ingress:
  - ports:
    - port: 15012
      protocol: TCP
  podSelector:
    matchLabels:
      app: istiod
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-knative-to-istio-gateways
  namespace: istio-system
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: knative-serving
    ports:
    - port: 8080
      protocol: TCP
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - istio-ingressgateway
      - cluster-local-gateway
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-allow-same-namespace-istio-system
  namespace: istio-system
spec:
  ingress:
  - from:
    - podSelector: {}
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: istiod-webhook-apiserver
  namespace: istio-system
spec:
  ingress:
  - ports:
    - port: 15017
      protocol: TCP
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - istiod
  policyTypes:
  - Ingress

{- end }
